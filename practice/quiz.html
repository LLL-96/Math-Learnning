  <script>
    // 从 URL 获取单元 ID
    const urlParams = new URLSearchParams(window.location.search);
    const unitId = urlParams.get('unit') || 'grade1-unit1';
    
    // 从unitId提取年级，按需加载对应题库
    const grade = unitId.split('-')[0];
    
    loadGradeData(grade).then(() => {
      initPractice(unitId);
    }).catch(() => {
      // 加载失败时仍然尝试初始化（可能已有缓存数据）
      initPractice(unitId);
    });
  </script>
