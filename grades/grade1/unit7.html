<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>认识钟表 | L-MATH 乐学数学</title><link rel="stylesheet" href="../../assets/css/style.css"><link rel="stylesheet" href="../../components/footer.css"><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: linear-gradient(180deg, #FFF5EB 0%, #FFF 100%); min-height: 100vh; } .unit-header { background: linear-gradient(135deg, #FF6B6B 0%, #FFA8A8 100%); color: white; padding: 48px 24px 32px; text-align: center; } .unit-header .back-btn { color: white; font-weight: 600; font-size: 0.95rem; margin-bottom: 20px; opacity: 0.9; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; } .unit-header h1 { font-family: 'ZCOOL KuaiLe', cursive; font-size: 1.8rem; margin-bottom: 8px; } .unit-content { max-width: 800px; margin: 0 auto; padding: 32px 24px 64px; } .lesson-card { background: white; border-radius: 20px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); } .lesson-title { font-family: 'ZCOOL KuaiLe', cursive; font-size: 1.3rem; color: #FF6B6B; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; } .lesson-title .num { width: 32px; height: 32px; background: #FF6B6B; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; } .learn-box { background: #FFF5F5; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; border-left: 4px solid #FF6B6B; } .learn-box h4 { color: #FF6B6B; margin-bottom: 8px; } .learn-box ul { padding-left: 20px; color: #555; font-size: 0.9rem; line-height: 1.8; } .clock-demo { display: flex; justify-content: center; gap: 24px; margin: 24px 0; flex-wrap: wrap; } .clock-item { text-align: center; } .clock-face { width: 100px; height: 100px; border: 4px solid #FF6B6B; border-radius: 50%; position: relative; background: white; margin: 0 auto 8px; } .clock-face::before { content: ''; position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #FF6B6B; border-radius: 50%; transform: translate(-50%, -50%); } .clock-hand { position: absolute; top: 50%; left: 50%; transform-origin: left center; background: #333; height: 3px; } .hour-hand { width: 25px; transform: translateY(-50%); } .minute-hand { width: 35px; transform: translateY(-50%); background: #FF6B6B; } .practice-box { background: linear-gradient(135deg, #E8F8F5 0%, #D6FFF0 100%); border-radius: 16px; padding: 24px; border: 2px solid #69DB7C; } .practice-box h3 { font-family: 'ZCOOL KuaiLe', cursive; color: #2D8A4E; margin-bottom: 16px; } .question { background: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; } .q-num { width: 28px; height: 28px; background: #69DB7C; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; } .q-text { font-size: 0.95rem; color: #333; }</style></head>
<body><div class="unit-header"><a href="index.html" class="back-btn">← 返回一年级上册</a><h1>第七单元：认识钟表</h1><p class="unit-desc">整时、半时</p></div><div class="unit-content"><div class="lesson-card"><div class="lesson-title"><span class="num">1</span>学习目标</div><div class="learn-box"><h4>📌 本课重点</h4><ul><li>认识钟面和时针、分针</li><li>会认读整时</li><li>会认读半时</li></ul></div></div><div class="lesson-card"><div class="lesson-title"><span class="num">2</span>认识钟面</div><div class="learn-box"><h4>🕐 钟面组成</h4><ul><li>钟面上有<strong>12个数字</strong>：1、2、3……12</li><li><strong>时针</strong>（短针）：走得慢，表示时</li><li><strong>分针</strong>（长针）：走得快，表示分</li></ul></div></div><div class="lesson-card"><div class="lesson-title"><span class="num">3</span>认读整时</div><div class="clock-demo"><div class="clock-item"><div class="clock-face"><div class="clock-hand hour-hand" style="transform: translateY(-50%) rotate(-90deg);"></div><div class="clock-hand minute-hand" style="transform: translateY(-50%) rotate(180deg);"></div></div><div>7时</div></div><div class="clock-item"><div class="clock-face"><div class="clock-hand hour-hand" style="transform: translateY(-50%) rotate(0deg);"></div><div class="clock-hand minute-hand" style="transform: translateY(-50%) rotate(180deg);"></div></div><div>10时</div></div><div class="clock-item"><div class="clock-face"><div class="clock-hand hour-hand" style="transform: translateY(-50%) rotate(90deg);"></div><div class="clock-hand minute-hand" style="transform: translateY(-50%) rotate(180deg);"></div></div><div>1时</div></div></div><div class="learn-box"><h4>🔑 整时规律</h4><ul><li>分针指向<strong>12</strong>，时针指向几就是几时</li></ul></div></div><div class="practice-box"><h3>✏️ 练一练</h3><div class="question"><span class="q-num">1</span><span class="q-text">早上7时起床，在钟表上拨一拨</span></div><div class="question"><span class="q-num">2</span><span class="q-text">中午12时，时针和分针在哪里？</span></div><div class="question"><span class="q-num">3</span><span class="q-text">说说你每天的作息时间</span></div></div></div><footer class="footer"><div class="container"><p class="footer-text">🧮 L-MATH 乐学数学 一年级上册</p></div></footer></body></html>
