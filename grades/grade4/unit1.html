<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大数的认识 | L-MATH 乐学数学</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <link rel="stylesheet" href="../../components/footer.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(180deg, #FFF5EB 0%, #FFF 100%); min-height: 100vh; }
    .unit-header { background: linear-gradient(135deg, #69DB7C 0%, #8CE99A 100%); color: white; padding: 48px 24px 32px; text-align: center; }
    .unit-header .back-btn { display: inline-flex; align-items: center; gap: 6px; color: white; font-weight: 600; font-size: 0.95rem; margin-bottom: 20px; opacity: 0.9; }
    .unit-header .back-btn:hover { opacity: 1; text-decoration: underline; }
    .unit-header h1 { font-family: 'ZCOOL KuaiLe', cursive; font-size: 1.8rem; margin-bottom: 8px; }
    .unit-header .unit-desc { opacity: 0.9; font-size: 0.95rem; }
    .unit-content { max-width: 800px; margin: 0 auto; padding: 32px 24px 64px; }
    .lesson-card { background: white; border-radius: 20px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; }
    .lesson-title { font-family: 'ZCOOL KuaiLe', cursive; font-size: 1.3rem; color: #2D8A4E; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .lesson-title .num { width: 32px; height: 32px; background: #69DB7C; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 700; }
    .learn-box { background: #E8F8F5; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; border-left: 4px solid #69DB7C; }
    .learn-box h4 { font-size: 0.95rem; color: #2D8A4E; margin-bottom: 8px; }
    .learn-box ul { padding-left: 20px; color: #555; font-size: 0.9rem; line-height: 1.8; }
    .example-box { background: #F8F9FA; border-radius: 12px; padding: 20px; margin: 16px 0; }
    .example-box h4 { font-size: 0.9rem; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .big-num { font-size: 2rem; text-align: center; color: #2D8A4E; font-weight: 700; margin: 20px 0; font-family: monospace; }
    .place-value { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin: 16px 0; }
    .place { background: #E8F8F5; border-radius: 8px; padding: 12px 8px; text-align: center; }
    .place .label { font-size: 0.75rem; color: #888; }
    .place .value { font-size: 1.4rem; color: #2D8A4E; font-weight: 700; }
    .practice-box { background: linear-gradient(135deg, #FFF5F5 0%, #FFE8E8 100%); border-radius: 16px; padding: 24px; border: 2px solid #FF6B6B; }
    .practice-box h3 { font-family: 'ZCOOL KuaiLe', cursive; color: #D63031; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .question { background: white; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .q-num { width: 28px; height: 28px; background: #FF6B6B; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .q-text { font-size: 0.95rem; color: #333; }
  </style>
</head>
<body>
  <div class="unit-header">
    <a href="index.html" class="back-btn">← 返回四年级上册</a>
    <h1>第一单元：大数的认识</h1>
    <p class="unit-desc">亿以内数的认识 · 亿以上数的认识</p>
  </div>

  <div class="unit-content">
    <div class="lesson-card">
      <div class="lesson-title"><span class="num">1</span>学习目标</div>
      <div class="learn-box">
        <h4>📌 本课重点</h4>
        <ul>
          <li>认识万、十万、百万、千万、亿等计数单位</li>
          <li>会读、写大数</li>
          <li>知道数位顺序表</li>
        </ul>
      </div>
    </div>

    <div class="lesson-card">
      <div class="lesson-title"><span class="num">2</span>数位顺序表</div>
      <div class="example-box">
        <h4>📊 从右往左数</h4>
        <div class="place-value">
          <div class="place"><div class="label">万位</div><div class="value">1</div></div>
          <div class="place"><div class="label">千位</div><div class="value">2</div></div>
          <div class="place"><div class="label">百位</div><div class="value">3</div></div>
          <div class="place"><div class="label">十位</div><div class="value">4</div></div>
          <div class="place"><div class="label">个位</div><div class="value">5</div></div>
        </div>
        <p style="text-align:center;color:#555;font-size:0.95rem;">读作：一万二千三百四十五</p>
      </div>
    </div>

    <div class="lesson-card">
      <div class="lesson-title"><span class="num">3</span>大数读法</div>
      <div class="example-box">
        <h4>📖 读一读</h4>
        <div class="big-num">1,2345,6789</div>
        <p style="text-align:center;color:#555;font-size:0.95rem;">读作：一亿二千三百四十五万六千七百八十九</p>
        <p style="text-align:center;color:#888;font-size:0.85rem;margin-top:8px;">先分级，再从高位读起</p>
      </div>
    </div>

    <div class="practice-box">
      <h3>✏️ 练一练</h3>
      <div class="question"><span class="q-num">1</span><span class="q-text">读出这个数：30050000</span></div>
      <div class="question"><span class="q-num">2</span><span class="q-text">写出：五千万零三百</span></div>
      <div class="question"><span class="q-num">3</span><span class="q-text">一亿有多少个一万？</span></div>
    </div>
  </div>

  <footer class="footer"><div class="container"><p class="footer-text">🧮 L-MATH 乐学数学 · 四年级上册</p></div></footer>
</body>
</html>
