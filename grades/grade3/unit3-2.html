<body><div class="unit-header"><a href="index2.html" class="back-btn">← 返回三年级下册</a><h1>第三单元：复式统计表</h1><p class="unit-desc">数据的整理与分析</p></div><div class="unit-content"><div class="lesson-card"><div class="lesson-title"><span class="num">1</span>学习目标</div><div class="learn-box"><h4>📌 本课重点</h4><ul><li>认识复式统计表</li><li>会填写复式统计表</li><li>能根据统计表分析数据</li></ul></div></div><div class="lesson-card"><div class="lesson-title"><span class="num">2</span>复式统计表</div><table class="table-demo"><tr><th>年级</th><th>男生</th><th>女生</th><th>合计</th></tr><tr><td>三年级</td><td>25</td><td>23</td><td>48</td></tr><tr><td>四年级</td><td>28</td><td>26</td><td>54</td></tr><tr><td>五年级</td><td>30</td><td>28</td><td>58</td></tr></table><div class="learn-box"><h4>📊 复式统计表的特点</h4><ul><li>可以同时统计多个项目的数据</li><li>便于比较不同项目的数据</li><li>便于进行数据分析和决策</li></ul></div></div><div class="practice-box"><h3>✏️ 练一练</h3><div class="question"><span class="q-num">1</span><span class="q-text">哪个年级人数最多？</span></div><div class="question"><span class="q-num">2</span><span class="q-text">三年级比四年级少多少人？</span></div><div class="question"><span class="q-num">3</span><span class="q-text">调查班级同学喜欢的运动，制成复式统计表</span></div></div></div><footer class="footer"><div class="container"><p class="footer-text">🧮 L-MATH 乐学数学 三年级下册</p></div></footer></body></html>
