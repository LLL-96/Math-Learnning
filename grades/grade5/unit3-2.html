<body><div class="unit-header"><a href="index2.html" class="back-btn">← 返回五年级下册</a><h1>第三单元：长方体和正方体</h1><p class="unit-desc">认识、体积、表面积</p></div><div class="unit-content"><div class="lesson-card"><div class="lesson-title"><span class="num">1</span>学习目标</div><div class="learn-box"><h4>📌 本课重点</h4><ul><li>认识长方体和正方体的特征</li><li>理解体积的概念</li><li>掌握体积和表面积的计算</li></ul></div></div><div class="lesson-card"><div class="lesson-title"><span class="num">2</span>体积公式</div><div class="formula">长方体体积 = 长 × 宽 × 高</div><div class="formula">正方体体积 = 棱长 × 棱长 × 棱长</div></div><div class="lesson-card"><div class="lesson-title"><span class="num">3</span>表面积公式</div><div class="formula">长方体表面积 = (长×宽 + 长×高 + 宽×高) × 2</div><div class="formula">正方体表面积 = 棱长² × 6</div></div><div class="practice-box"><h3>✏️ 练一练</h3><div class="question"><span class="q-num">1</span><span class="q-text">长方体长5cm、宽4cm、高3cm，体积是多少？</span></div><div class="question"><span class="q-num">2</span><span class="q-text">正方体棱长4cm，表面积是多少？</span></div><div class="question"><span class="q-num">3</span><span class="q-text">体积单位有哪些？它们之间的进率是多少？</span></div></div></div><footer class="footer"><div class="container"><p class="footer-text">🧮 L-MATH 乐学数学 五年级下册</p></div></footer></body></html>
