    .unit-num { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; color: white; flex-shrink: 0; background: #69DB7C; }

    .semester-tab { padding: 10px 24px; border-radius: 999px; font-weight: 600; font-size: 0.95rem; background: white; color: #666; border: 2px solid #eee; cursor: pointer; transition: all 0.3s; text-decoration: none; }
    .semester-tab.active { background: #69DB7C; color: white; border-color: #69DB7C; }
